<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRGB — Portfolio</title>
  <style>
    :root {
      --bg: #050505;
      --line: rgba(255,255,255,0.12);
      --text: #f4f4f4;
      --muted: #a0a0a0;
      --accent: #ff3b3b;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: min(calc(100% - 2rem), var(--max));
      margin: 0 auto;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--line);
    }

    .hero {
      padding: 3rem 0 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* SHARED SCALE SYSTEM */
    .hero-title {
      font-size: clamp(3rem, 6vw, 6rem);
      line-height: 1;
      margin: 0 0 1rem;
      letter-spacing: -0.05em;
    }

    /* UPDATED LOGO SIZE (slightly bigger than text) */
   .logo {
  width: clamp(3.8rem, 7vw, 7rem);
  height: auto;
  margin-bottom: 0.6rem; /* increased spacing */
  display: block;

  transform: translateY(8px) scale(1.08);

  opacity: 0;
  filter: contrast(1.2) drop-shadow(0 0 10px rgba(255,0,0,0.35));
  animation: logoIntro 1.2s ease forwards, logoFlicker 3s ease 1.2s infinite;
}

    .glitch {
      position: relative;
      display: inline-block;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0;
    }

    .glitch:hover::before {
      color: cyan;
      transform: translate(2px,0);
      opacity: 0.6;
    }

    .glitch:hover::after {
      color: red;
      transform: translate(-2px,0);
      opacity: 0.6;
    }

    .role {
      color: var(--accent);
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .video-wrapper {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 1.8rem;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .btn {
      padding: 0.9rem 1.4rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      transition: all 0.2s ease;
      backdrop-filter: blur(6px);
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn.primary {
      background: var(--text);
      color: #000;
      border: none;
      font-weight: bold;
    }

    .about-text {
      max-width: 700px;
      margin: 0 auto;
      color: var(--muted);
      line-height: 1.7;
    }

    @keyframes logoIntro {
      0% {
        opacity: 0;
        transform: translateY(-10px) scale(0.95);
        filter: blur(4px);
      }
      60% {
        opacity: 1;
        transform: translateY(2px) scale(1.08);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translateY(8px) scale(1.08);
      }
    }

    @keyframes logoFlicker {
      0%, 92%, 100% {
        opacity: 1;
        transform: translateY(8px) scale(1.08) translateX(0);
      }
      93% {
        opacity: 0.4;
        transform: translateY(8px) scale(1.08) translateX(2px);
      }
      94% {
        opacity: 1;
        transform: translateY(8px) scale(1.08) translateX(-2px);
      }
      95% {
        opacity: 0.6;
        transform: translateY(8px) scale(1.08) translateX(1px);
      }
      96% {
        opacity: 1;
        transform: translateY(8px) scale(1.08) translateX(0);
      }
    }
  </style>
</head>

<body>

  <div class="container nav">
    <div>BRGB / Patrick Girard</div>
  </div>

  <section class="hero">
    <img class="logo" src="https://github.com/Bigredglassesboy/brgb/blob/main/smallglasses.png?raw=true" alt="BRGB logo" />
    
    <h1 class="glitch hero-title" data-text="BRGB">BRGB</h1>
    <div class="role" id="role">Creative Director</div>

    <div class="video-wrapper">
      <iframe
        src="https://www.youtube.com/embed/36RTOZhgoRc"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <div class="buttons">
      <a class="btn" href="https://drive.google.com/file/d/13j70LfojxHGkUkXLM6ObBhSg39YxVi4R/view?usp=drive_link">CV</a>
      <a class="btn primary" href="https://drive.google.com/file/d/1MQquyjhduI-4ZBesvsQyHhzDnIyqxm5Q/view?usp=drive_link">PDF Deck</a>
      <a class="btn" href="https://www.linkedin.com/in/patrick-girard-quinnell/">LinkedIn</a>
    </div>

    <p class="about-text">
      Creative director, art director and creative technologist working across immersive media, digital experiences, real-time production and visual storytelling.
    </p>

  </section>

  <script>
    const roles = [
      "Creative Director",
      "Art Director",
      "Immersive Storyteller",
      "Creative Technologist"
    ];

    let i = 0;
    const roleEl = document.getElementById("role");

    roleEl.style.transition = "opacity 180ms ease, transform 180ms ease";

    setInterval(() => {
      i = (i + 1) % roles.length;

      roleEl.style.opacity = 0;
      roleEl.style.transform = "translateY(6px)";

      setTimeout(() => {
        roleEl.textContent = roles[i];
        roleEl.style.opacity = 1;
        roleEl.style.transform = "translateY(0)";
      }, 180);

    }, 2200);
  </script>

</body>
</html>
