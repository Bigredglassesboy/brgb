<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRGB</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      width: 140px;
      margin-bottom: 1.5rem;
      display: block;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.25rem;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
      color: #ccc;
      max-width: 600px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 720px;
      margin-bottom: 2rem;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .links {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1rem;
    }

    a {
      color: #fff;
      text-decoration: none;
      border: 1px solid #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    a:hover {
      background-color: #fff;
      color: #000;
    }

    .social-icons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 1rem;
    }

    .social-icons a svg {
      width: 24px;
      height: 24px;
      fill: #fff;
      transition: fill 0.3s ease;
    }

    .social-icons a:hover svg {
      fill: #ccc;
    }

    /* Responsive video */
    .video-inner {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }

    .video-inner iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

  </style>
</head>

<body>

  <!-- Logo -->
  <img 
    src="https://raw.githubusercontent.com/Bigredglassesboy/brgb/main/smallglasses.png" 
    alt="BRGB Logo" 
    class="logo">

  <!-- Title -->
  <h1>BRGB | Big Red Glasses Boy</h1>

  <!-- Subtitle -->
  <h2>
    Creative Director — Immersive & Experiential Work<br>
    Designing immersive installations, live experiences and digital platforms across fashion, culture and technology.
  </h2>

  <!-- Video -->
  <div class="video-wrapper">
    <div class="video-inner">
      <iframe 
        src="https://www.youtube.com/embed/36RTOZhgoRc" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <!-- Links -->
  <div class="links">
    <a href="https://drive.google.com/file/d/15ufrkQnTYLmLT20ORS2-My93Ks47Tr3_/view?usp=drive_link" rel="noopener noreferrer">Download CV</a>
    <a href="https://drive.google.com/file/d/1MQquyjhduI-4ZBesvsQyHhzDnIyqxm5Q/view?usp=drive_link" rel="noopener noreferrer">View Portfolio Deck</a>
  </div>

  <!-- Social Icons -->
  <div class="social-icons">

    <!-- LinkedIn -->
    <a href="https://www.linkedin.com/in/patrick-girard-quinnell/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
      <svg viewBox="0 0 24 24">
        <path d="M4.98 3.5c0 1.38-1.1 2.5-2.48 2.5S0 4.88 0 3.5 1.1 1 2.5 1s2.48 1.12 2.48 2.5zM.5 8h4V24h-4V8zm7.5 0h3.8v2.2h.05c.53-1 1.83-2.2 3.75-2.2 4 0 4.7 2.6 4.7 6v9h-4V15c0-2.4-.04-5.5-3.35-5.5-3.4 0-3.9 2.6-3.9 5.3v9.2h-4V8z"/>
      </svg>
    </a>

    <!-- Instagram -->
    <a href="https://www.instagram.com/bigredglassesboy" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <svg viewBox="0 0 24 24">
        <path d="M12 2.2c3.2 0 3.6 0 4.9.1 1.2.1 1.9.3 2.3.5.6.3 1 .7 1.3 1.3.2.4.4 1.1.5 2.3.1 1.3.1 1.7.1 4.9s0 3.6-.1 4.9c-.1 1.2-.3 1.9-.5 2.3-.3.6-.7 1-1.3 1.3-.4.2-1.1.4-2.3.5-1.3.1-1.7.1-4.9.1s-3.6 0-4.9-.1c-1.2-.1-1.9-.3-2.3-.5-.6-.3-1-.7-1.3-1.3-.2-.4-.4-1.1-.5-2.3C2.2 15.6 2.2 15.2 2.2 12s0-3.6.1-4.9c.1-1.2.3-1.9.5-2.3.3-.6.7-1 1.3-1.3.4-.2 1.1-.4 2.3-.5C8.4 2.2 8.8 2.2 12 2.2zm0-2.2C8.7 0 8.3 0 7 .1 5.7.2 4.7.4 3.9.9c-.9.5-1.7 1.3-2.2 2.2C1.1 4.7.9 5.7.8 7 .7 8.3.7 8.7.7 12s0 3.7.1 5c.1 1.3.3 2.3.9 3.1.5.9 1.3 1.7 2.2 2.2.8.5 1.8.7 3.1.8 1.3.1 1.7.1 5 .1s3.7 0 5-.1c1.3-.1 2.3-.3 3.1-.8.9-.5 1.7-1.3 2.2-2.2.5-.8.7-1.8.8-3.1.1-1.3.1-1.7.1-5s0-3.7-.1-5c-.1-1.3-.3-2.3-.8-3.1-.5-.9-1.3-1.7-2.2-2.2-.8-.5-1.8-.7-3.1-.8C15.7 0 15.3 0 12 0z"/>

  </div>

</body>
</html>
